name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build distributions
        run: python -m pip install build==1.5.0 twine==6.2.0 && python -m build && python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-package-distributions
          path: dist/

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@b14a5cd0d6e6ae92d0f7e6f06c5fef7dfd951c2f # v5.0.0
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify clean wheel install
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -m pip check
          python - <<'PY'
          import importlib.metadata as metadata

          import physicalai.capture
          import physicalai.inference
          import physicalai.robot
          import physicalai.runtime

          print(metadata.version("physicalai"))
          PY

  publish:
    runs-on: ubuntu-latest
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/physicalai
    steps:
      - name: Download distributions
        uses: actions/download-artifact@b14a5cd0d6e6ae92d0f7e6f06c5fef7dfd951c2f # v5.0.0
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
